name: Gold Monitor

on:
  schedule:
    # Run every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r gold_tracker/requirements-ci.txt

      - name: Prepare gold_tracker data directory
        run: |
          mkdir -p gold_tracker/data
          cp data/gold_history.csv gold_tracker/data/gold_history.csv

      - name: Create .env for gold_tracker
        run: |
          cat > gold_tracker/.env << EOF
          RECEIVER_EMAIL=${{ secrets.RECEIVER_EMAIL }}
          TCMB_EVDS_KEY=${{ secrets.TCMB_EVDS_KEY }}
          PROXY_URL=${{ secrets.PROXY_URL }}
          SMTP_SERVER=${{ secrets.SMTP_SERVER }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          EOF

      - name: Run gold monitor
        working-directory: gold_tracker
        run: python main.py

      - name: Sync updated CSV back
        run: cp gold_tracker/data/gold_history.csv data/gold_history.csv

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gold_history.csv
          if git diff --cached --quiet; then
            echo "No new data — nothing to commit."
          else
            git commit -m "Auto-update gold_history.csv [skip ci]"
            git push
          fi
